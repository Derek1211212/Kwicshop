<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Touton SAS Ghana - Contact Slide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --touton-maroon: #800000;
        }
        .text-touton-maroon { color: var(--touton-maroon); }
        .bg-touton-maroon { background-color: var(--touton-maroon); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-5xl aspect-video shadow-2xl relative flex flex-col overflow-hidden border-b-8 border-touton-maroon">
        
        <div class="absolute top-0 left-0 w-full h-1 bg-gray-100 flex">
            <div class="bg-touton-maroon w-1/4"></div>
            <div class="bg-gray-100 flex-1"></div>
        </div>

        <main class="flex-grow flex items-center px-20">
            
            <div class="grid grid-cols-12 w-full gap-12">
                
                <div class="col-span-5 flex flex-col justify-center border-r border-gray-100 pr-12">
                    <h1 class="text-4xl font-black text-gray-900 tracking-tighter uppercase leading-tight mb-4">
                        Touton SAS <br><span class="text-touton-maroon">Ghana</span>
                    </h1>
                    <div class="h-1.5 w-16 bg-touton-maroon mb-8"></div>
                    <p class="text-xs font-black uppercase tracking-[0.4em] text-gray-400">Grievance Contact</p>
                </div>

                <div class="col-span-7 flex flex-col justify-center">
                    <div class="bg-gray-50 p-10 rounded-2xl border border-gray-100 relative shadow-sm group hover:shadow-xl transition-all duration-300">
                        
                        <div class="absolute -top-4 left-10 bg-touton-maroon text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest shadow-lg">
                            Grievance Facilitator
                        </div>

                        <div class="flex items-center gap-8">
                            <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center border-2 border-gray-100 text-touton-maroon text-4xl shadow-inner group-hover:scale-105 transition-transform">
                                <i class="fas fa-user-tie"></i>
                            </div>

                            <div>
                                <h2 class="text-3xl font-black text-gray-900 tracking-tight mb-1">
                                    Lawyer Chapman K. Zigah
                                </h2>
                                <p class="text-touton-maroon font-bold text-lg uppercase tracking-wide">
                                    Legal / Compliance Manager
                                </p>
                            </div>
                        </div>

                        <div class="mt-8 pt-8 border-t border-gray-200 flex gap-10">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-touton-maroon shadow-sm border border-gray-100">
                                    <i class="fas fa-envelope text-xs"></i>
                                </div>
                                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Office Protocol</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-touton-maroon shadow-sm border border-gray-100">
                                    <i class="fas fa-shield-alt text-xs"></i>
                                </div>
                                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Confidential Reporting</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <footer class="px-20 py-12 flex justify-between items-center text-gray-300">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 border-2 border-gray-200 flex items-center justify-center font-bold text-[10px] rounded flex flex-col leading-none">
                    <span>T</span>
                </div>
                <span class="text-[9px] font-black tracking-[0.3em] uppercase">Touton Compliance Framework</span>
            </div>
            <div class="text-[10px] font-black flex items-center gap-4">
                <span class="bg-gray-50 px-3 py-1 rounded text-gray-400">ACCRA HQ</span>
                <span class="text-gray-200">SLIDE 12</span>
            </div>
        </footer>

    </div>

</body>
</html>
