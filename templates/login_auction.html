<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Sign In – AuctionHub</title>
  <style>
    :root{--primary:#0f172a;--accent:#f97316;--text:#e2e8f0;--text-light:#94a3b8;}
    body{margin:0;padding:0;background:linear-gradient(135deg,var(--primary),#020617);color:var(--text);font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;}
    .login-box{background:rgba(15,23,42,.9);padding:40px;border-radius:8px;max-width:400px;width:100%;box-shadow:0 8px 20px rgba(0,0,0,.5);}
    h2{margin-bottom:20px;text-align:center;color:var(--accent);}
    input{width:100%;padding:12px;margin-bottom:15px;border:none;border-radius:6px;background:#1e293b;color:var(--text);font-size:1rem;}
    .btn-primary{width:100%;padding:12px;border:none;border-radius:6px;background:var(--accent);color:var(--primary);font-size:1rem;cursor:pointer;transition:background .3s;}
    .btn-primary:hover{background:#ea580c;}
    .link{text-align:center;margin-top:15px;}
    .link a{color:var(--text-light);text-decoration:none;}
    .link a:hover{color:var(--accent);}

    .flash { margin-bottom:15px; padding:10px; border-radius:4px; }
    .flash.success { background:#c6f6d5; color:#2f855a;}
    .flash.info    { background:#bee3f8; color:#2b6cb0;}
    .flash.warning { background:#faf089; color:#975a16;}
    .flash.danger  { background:#fed7d7; color:#9b2c2c;}
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Sign In</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat,msg in messages %}
          <div class="flash {{cat}}">{{msg}}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('sign_in') }}" method="post">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit" class="btn-primary">Sign In</button>
    </form>
    <div class="link">
      <a href="{{ url_for('signup_auction') }}">Don't have an account? Register</a>
    </div>
  </div>
</body>
</html>
