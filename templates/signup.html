<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - SwapSphere</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Shared styles */
    :root {
      --primary-color: #2ECC71;
      --secondary-color: #34495E;
      --background-color: #F8F9FA;
      --input-border: #EAEDED;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--background-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      max-width: 500px;
      margin: 2rem auto;
      padding: 1.5rem;
      width: 90%;
    }
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo {
      color: var(--primary-color);
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .form-container {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--secondary-color);
      font-weight: 500;
    }
    input, select {
      width: 100%;
      padding: 0.8rem;
      border: 2px solid var(--input-border);
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary-color);
    }
    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--secondary-color);
    }
    .submit-btn {
      background: var(--primary-color);
      color: white;
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }
    .submit-btn:hover {
      opacity: 0.9;
    }
    .switch-form {
      text-align: center;
      margin-top: 1.5rem;
    }
    .switch-form a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
    }
    .error-message {
      color: #e74c3c;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
    }
    @media (max-width: 480px) {
      .container {
        padding: 1rem;
      }
      .form-container {
        padding: 1.5rem;
      }
      input, select {
        padding: 0.7rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">SwapSphere</div>
      <h1>Create Account</h1>
    </div>

    <div class="form-container">
      <form id="signupForm" method="POST">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required>
          <div class="error-message" id="usernameError"></div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
          <div class="error-message" id="emailError"></div>
        </div>

        <!-- Country Code Selector -->
        <div class="form-group">
          <label for="country_code">Country Code</label>
          <select id="country_code" name="country_code" required>
            <!-- Sample options; add or modify as needed -->
            <option value="+1">+1 (USA)</option>
            <option value="+44">+44 (UK)</option>
            <option value="+233">+233 (Ghana)</option>
            <option value="+91">+91 (India)</option>
          </select>
          <div class="error-message" id="countryCodeError"></div>
        </div>

        <!-- Phone Number Input -->
        <div class="form-group">
          <label for="phone_number">Phone Number</label>
          <input type="text" id="phone_number" name="phone_number" required placeholder="Enter without country code or leading 0">
          <div class="error-message" id="phoneNumberError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="8">
          <i class="fas fa-eye password-toggle" id="togglePassword"></i>
          <div class="error-message" id="passwordError"></div>
        </div>

        <button type="submit" class="submit-btn">Sign Up</button>
      </form>

      <div class="switch-form">
        Already have an account? <a href="/login">Login</a>
      </div>
    </div>
  </div>

  <script>
    // Password toggle
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');
    togglePassword.addEventListener('click', function() {
      const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
      password.setAttribute('type', type);
      this.classList.toggle('fa-eye-slash');
    });

    // Form validation
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username');
      const email = document.getElementById('email');
      const countryCode = document.getElementById('country_code');
      const phoneNumber = document.getElementById('phone_number');
      const password = document.getElementById('password');
      let isValid = true;
      
      // Clear previous errors
      document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');
      
      // Username validation
      if (username.value.length < 3) {
        document.getElementById('usernameError').textContent = 'Username must be at least 3 characters';
        document.getElementById('usernameError').style.display = 'block';
        isValid = false;
      }
      
      // Email validation
      if (!validateEmail(email.value)) {
        document.getElementById('emailError').textContent = 'Please enter a valid email address';
        document.getElementById('emailError').style.display = 'block';
        isValid = false;
      }
      
      // Country code validation (if needed)
      if (countryCode.value.trim() === '') {
        document.getElementById('countryCodeError').textContent = 'Please select your country code';
        document.getElementById('countryCodeError').style.display = 'block';
        isValid = false;
      }
      
      
      // Password validation
      if (password.value.length < 6) {
        document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
        document.getElementById('passwordError').style.display = 'block';
        isValid = false;
      }
      
      if (isValid) {
        // Submit form if all validations pass
        this.submit();
      }
    });
    
    function validateEmail(email) {
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return re.test(email);
    }
  </script>
</body>
</html>
