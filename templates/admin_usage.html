<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1"><!-- Responsive meta -->
  <title>Advanced Website Analytics Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.3.0/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1"></script>
  <style>
    :root {
      --primary: #28a745; --primary-dark: #218838;
    }
    body {
      background: #f5f7fb; color: #343a40;
      font-family: 'Segoe UI', sans-serif;
    }
    .dashboard-header {
      background: linear-gradient(120deg, var(--primary), var(--primary-dark));
      color: white; padding: 1.5rem 0; margin-bottom: 2rem;
      border-radius: 0 0 20px 20px;
    }
    .card { margin-bottom: 1rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .card-title { font-size: .9rem; color: #6c757d; }
    .stat-value { font-size: 1.5rem; font-weight: 700; }
    .chart-container { background: white; border-radius: 12px; padding: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
    .filter-section { background: white; border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .section-title { color: var(--primary); font-weight: 600; font-size: 1.1rem; margin-bottom: 1rem; }
    img.avatar-sm { width:30px; height:30px; border-radius:50%; object-fit:cover; }
    .table-responsive { margin-top:1rem; }
    @media (max-width: 767.98px) {
      .dashboard-header .d-flex { flex-direction: column; gap: .5rem; }
      .filter-section .row > [class*='col-'] { margin-bottom: .75rem; }
    }
  </style>
</head>
<body>
  <header class="dashboard-header">
    <div class="container-fluid">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h1 class="h4 mb-1"><i class="bi bi-graph-up"></i> Analytics Dashboard</h1>
          <small>Insights into your website traffic</small>
        </div>
        <div class="d-flex align-items-center">
          <span class="me-3"><i class="bi bi-people-fill me-1"></i><span id="real-time-count">0</span> active</span>
          <button class="btn btn-light btn-sm" onclick="exportReport()"><i class="bi bi-box-arrow-up-right me-1"></i>Export</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container-fluid mb-5">
    <!-- Filters -->
    <div class="filter-section">
      <div class="row gx-2 gy-2">
        <div class="col-6 col-sm-4 col-md-3">
          <label>Date Range</label>
          <input type="text" id="daterange" class="form-control">
        </div>
        <div class="col-6 col-sm-4 col-md-2">
          <label>Period</label>
          <select id="periodFilter" class="form-select">
            <option value="day">Daily</option>
            <option value="week">Weekly</option>
            <option value="month">Monthly</option>
            <option value="year">Yearly</option>
          </select>
        </div>
        <div class="col-6 col-sm-4 col-md-2">
          <label>Device</label>
          <select id="deviceFilter" class="form-select">
            <option value="all">All</option>
            <option value="desktop">Desktop</option>
            <option value="mobile">Mobile</option>
            <option value="tablet">Tablet</option>
          </select>
        </div>
        <div class="col-6 col-sm-4 col-md-2">
          <label>Visitor</label>
          <select id="visitorTypeFilter" class="form-select">
            <option value="all">All</option>
            <option value="new">New</option>
            <option value="returning">Returning</option>
          </select>
        </div>
        <div class="col-12 col-md-3 d-grid">
          <button class="btn btn-primary mt-4" onclick="loadAllData()">
            <i class="bi bi-funnel-fill me-1"></i> Apply Filters
          </button>
        </div>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="row">
      <div class="col-6 col-md-3">
        <div class="card text-center p-3">
          <i class="bi bi-people-fill fs-2 text-primary mb-2"></i>
          <div class="card-title">Unique Visitors</div>
          <div id="total" class="stat-value">0</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card text-center p-3">
          <i class="bi bi-eye-fill fs-2 text-success mb-2"></i>
          <div class="card-title">Page Views</div>
          <div id="page-views" class="stat-value">0</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card text-center p-3">
          <i class="bi bi-clock-fill fs-2 text-warning mb-2"></i>
          <div class="card-title">Avg. Session</div>
          <div id="avg-session" class="stat-value">0m 0s</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card text-center p-3">
          <i class="bi bi-arrow-repeat fs-2 text-info mb-2"></i>
          <div class="card-title">Bounce Rate</div>
          <div id="bounce-rate" class="stat-value">0%</div>
        </div>
      </div>
    </div>

    <!-- Charts -->
    <div class="row mt-4">
      <div class="col-12 col-lg-8">
        <div class="chart-container">
          <div class="section-title"><i class="bi bi-bar-chart-line me-1"></i>Visitor Traffic</div>
          <canvas id="activityChart"></canvas>
        </div>
      </div>
      <div class="col-12 col-lg-4">
        <div class="chart-container">
          <div class="section-title"><i class="bi bi-pie-chart-fill me-1"></i>Traffic Sources</div>
          <canvas id="trafficSourceChart"></canvas>
        </div>
      </div>
    </div>

    <div class="row mt-4">
      <div class="col-12 col-lg-4">
        <div class="chart-container">
          <div class="section-title"><i class="bi bi-phone me-1"></i>Device Breakdown</div>
          <canvas id="deviceChart"></canvas>
        </div>
      </div>
      <div class="col-12 col-lg-8">
        <div class="chart-container">
          <div class="section-title"><i class="bi bi-file-earmark-text me-1"></i>Top Pages</div>
          <div id="top-pages-container" class="mt-3 text-center text-muted">
            <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading…</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Active Visitors Table -->
    <div class="chart-container">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="section-title mb-0"><i class="bi bi-lightning-charge-fill me-1"></i>Current Active Visitors</div>
        <small id="last-updated">Updated just now</small>
      </div>
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Visitor</th>
              <th>Location</th>
              <th>Device</th>
              <th>Duration</th>
              <th>Page</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="active-visitors-body">
            <tr>
              <td colspan="6" class="text-center py-4 text-muted">
                <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading…</span></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    // globals
    let activityChart, trafficSourceChart, deviceChart;
    const { DateTime } = luxon;
    let previousData = {};

    // Helpers
    function formatDuration(sec) {
      const m = Math.floor(sec/60), s = sec%60;
      return `${m}m ${s}s`;
    }
    function generateAvatar(name) {
      const initials = (name||'Anonymous').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
      const colors = ['#28a745','#218838','#5cb85c','#5bc0de','#155724'];
      const bg = colors[Math.floor(Math.random()*colors.length)];
      return `<div class="avatar-sm" style="background:${bg};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;">${initials}</div>`;
    }
    function initCharts() {
      const actCtx = document.getElementById('activityChart').getContext('2d');
      activityChart = new Chart(actCtx, { type:'line', data:{ labels:[], datasets:[
        { label:'Unique Visitors', data:[], borderColor:'#28a745', backgroundColor:'rgba(40,167,69,0.1)', tension:0.3 },
        { label:'Page Views',      data:[], borderColor:'#5cb85c', backgroundColor:'rgba(92,184,92,0.1)', tension:0.3 }
      ]}, options:{ responsive:true }});
      const srcCtx = document.getElementById('trafficSourceChart').getContext('2d');
      trafficSourceChart = new Chart(srcCtx, { type:'doughnut', data:{ labels:[], datasets:[{ data:[], backgroundColor:['#28a745','#5cb85c','#218838'] }]}, options:{ responsive:true, cutout:'70%' }});
      const devCtx = document.getElementById('deviceChart').getContext('2d');
      deviceChart = new Chart(devCtx, { type:'pie', data:{ labels:[], datasets:[{ data:[], backgroundColor:['#28a745','#5cb85c','#218838'] }]}, options:{ responsive:true }});
    }

    // Data loaders
    function loadAnalytics(){
      const [start,end] = document.getElementById('daterange').value.split(' to ');
      const period = document.getElementById('periodFilter').value;
      if(!start||!end) return;
      fetch(`/admin/analytics?start=${start}&end=${end}&period=${period}`)
        .then(r=>r.json()).then(d=>{
          document.getElementById('total').innerText = (d.summary.total_unique||0).toLocaleString();
          document.getElementById('page-views').innerText = (d.summary.page_views||0).toLocaleString();
          document.getElementById('avg-session').innerText = formatDuration(d.summary.avg_session||0);
          document.getElementById('bounce-rate').innerText = (d.summary.bounce_rate||0)+'%';
          document.getElementById('real-time-count').innerText = d.active||0;
          // update chart
          const labels = d.chart.map(r=> DateTime.fromISO(r.date).toFormat('MMM dd'));
          activityChart.data.labels = labels;
          activityChart.data.datasets[0].data = d.chart.map(r=>r.unique_visitors);
          activityChart.data.datasets[1].data = d.chart.map(r=>r.page_views);
          activityChart.update();
        }).catch(console.error);
    }

    function loadTrafficSources(){
      fetch('/admin/traffic_sources').then(r=>r.json()).then(d=>{
        trafficSourceChart.data.labels = d.labels;
        trafficSourceChart.data.datasets[0].data = d.values;
        trafficSourceChart.update();
      }).catch(console.error);
    }

    function loadDeviceData(){
      fetch('/admin/device_breakdown').then(r=>r.json()).then(d=>{
        deviceChart.data.labels = d.labels;
        deviceChart.data.datasets[0].data = d.values;
        deviceChart.update();
      }).catch(console.error);
    }

    function loadTopPages(){
      fetch('/admin/top_pages').then(r=>r.json()).then(d=>{
        let html = '';
        d.forEach((p,i)=> {
          html += `<div class="d-flex justify-content-between align-items-center py-2 ${i<d.length-1?'border-bottom':''}">
            <div><strong>${i+1}.</strong> ${p.page}</div>
            <span>${p.views.toLocaleString()} views</span>
          </div>`;
        });
        document.getElementById('top-pages-container').innerHTML = html||'<div class="text-muted py-3">No data</div>';
      }).catch(e=>{
        console.error(e);
        document.getElementById('top-pages-container').innerHTML = '<div class="text-danger py-3">Failed to load</div>';
      });
    }

    function loadActiveVisitors(){
      fetch('/admin/active_visitors').then(r=>r.json()).then(vis=>{
        const tb = document.getElementById('active-visitors-body');
        tb.innerHTML = '';
        if(!vis.length){
          tb.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No active visitors</td></tr>';
        } else vis.forEach(v=>{
          const avatar = v.avatar? `<img src="${v.avatar}" class="avatar-sm">` : generateAvatar(v.username||v.name);
          const deviceIcon = /mobile/i.test(v.user_agent)?'bi-phone': /tablet/i.test(v.user_agent)?'bi-tablet':'bi-pc';
          const duration = Math.floor((Date.now() - new Date(v.last_seen))/1000);
          tb.innerHTML += `<tr>
            <td>${avatar} ${v.username||v.name||'Anon'}</td>
            <td><i class="bi bi-geo-alt"></i> ${v.ip_address||'–'}</td>
            <td><i class="bi ${deviceIcon}"></i></td>
            <td>${formatDuration(duration)}</td>
            <td>${v.current_page}</td>
            <td><button class="btn btn-sm btn-outline-primary">Details</button></td>
          </tr>`;
        });
        document.getElementById('last-updated').innerText = `Updated ${new Date().toLocaleTimeString()}`;
      }).catch(e=>{
        console.error(e);
        document.getElementById('active-visitors-body').innerHTML = '<tr><td colspan="6" class="text-danger text-center py-4">Error loading</td></tr>';
      });
    }

    function loadAllData(){
      loadAnalytics();
      loadTrafficSources();
      loadDeviceData();
      loadTopPages();
      loadActiveVisitors();
    }

    function exportReport(){
      alert('Exporting report…');
      // hook up your CSV/PDF export here
    }

    // Init
    document.addEventListener('DOMContentLoaded', ()=> {
      initCharts();
      flatpickr('#daterange',{ mode:'range', dateFormat:'Y-m-d', defaultDate:[ new Date(Date.now()-7*24*3600*1000), new Date() ], onClose:loadAnalytics });
      loadAllData();
      setInterval(loadAllData,15000);
    });
  </script>
</body>
</html>
