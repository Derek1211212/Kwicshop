<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up for Auctions | SwapHub</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f3f5f7; }
    .container { max-width: 400px; margin: 80px auto; background: #fff;
      padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);}
    h2 { text-align:center; margin-bottom:20px; color:#2f855a; }
    .flash { margin-bottom:15px; padding:10px; border-radius:4px; }
    .flash.success { background:#c6f6d5; color:#2f855a;}
    .flash.info    { background:#bee3f8; color:#2b6cb0;}
    .flash.warning { background:#faf089; color:#975a16;}
    .flash.danger  { background:#fed7d7; color:#9b2c2c;}
    label { display:block; margin-bottom:5px; font-weight:bold; }
    input { width:100%; padding:10px; margin-bottom:15px;
      border:1px solid #cbd5e0; border-radius:4px; }
    input:focus { border-color:#48bb78; outline:none; box-shadow:0 0 0 2px rgba(72,184,120,0.3); }
    button { width:100%; padding:12px; background:#48bb78; color:#fff;
      border:none; border-radius:4px; font-size:1em; cursor:pointer; }
    button:hover { background:#38a169; }
    .footer { margin-top:15px; text-align:center; font-size:0.9em; }
    .footer a { color:#48bb78; text-decoration:none; }
    .footer a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Create Your Auction Account</h2>


    <form id="signupForm" action="{{ url_for('signup_auction') }}" method="POST">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required/>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required/>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required minlength="6"/>

      <label for="contact">Phone Number</label>
      <input type="text" id="contact" name="contact" required />

      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" required />

      <button type="submit">Sign Up</button>
    </form>

    <div class="footer">
      Already have an account? <a href="{{ url_for('sign_in') }}">Log in here</a>.
    </div>
  </div>
</body>
</html>
