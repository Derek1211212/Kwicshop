<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Make Swap Offer</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 2rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; }
    input, textarea, select { width: 100%; padding: 0.5rem; }
    button { padding: 0.7rem 1.5rem; background: #2ECC71; color: white; border: none; }
  </style>
</head>
<body>
  <h2>Make Swap Offer</h2>
  <form action="{{ url_for('create_proposal', listing_id=listing_id) }}" method="POST" enctype="multipart/form-data">
    <div class="form-group">
      <label for="proposed_item">Item You're Offering:</label>
      <input type="text" id="proposed_item" name="proposed_item" required>
    </div>
    
    <div class="form-group">
      <label for="additional_cash">Additional Cash (GHS):</label>
      <input type="number" id="additional_cash" name="additional_cash" step="0.01" min="0">
    </div>
    
    <div class="form-group">
      <label for="condition">Condition:</label>
      <select id="condition" name="condition" required>
        <option value="">Select Condition</option>
        <option value="new">New</option>
        <option value="like_new">Like New</option>
        <option value="used">Used</option>
        <option value="refurbished">Refurbished</option>
      </select>
    </div>
    
    <div class="form-group">
      <label for="image1">Image 1:</label>
      <input type="file" id="image1" name="image1" accept="image/*">
    </div>
    
    <div class="form-group">
      <label for="image2">Image 2:</label>
      <input type="file" id="image2" name="image2" accept="image/*">
    </div>
    
    <div class="form-group">
      <label for="image3">Image 3:</label>
      <input type="file" id="image3" name="image3" accept="image/*">
    </div>
    
    <div class="form-group">
      <label for="image4">Image 4:</label>
      <input type="file" id="image4" name="image4" accept="image/*">
    </div>
    
    <div class="form-group">
      <label for="detailed_description">Detailed Description:</label>
      <textarea id="detailed_description" name="detailed_description" rows="4" required></textarea>
    </div>
    
    <div class="form-group">
      <label for="message">Message to Owner (Optional):</label>
      <textarea id="message" name="message" rows="3"></textarea>
    </div>
    
    <button type="submit">Submit Offer</button>
  </form>

  <script src="{{ url_for('static', filename='heartbeat.js') }}"></script>
</body>
</html>
