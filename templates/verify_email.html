<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verify Your Email | kwicshop</title>
  <style>
    body { background:#f4f7fa; font-family:Arial, sans-serif;
           display:flex; align-items:center; justify-content:center;
           height:100vh; margin:0; }
    .card { background:#fff; padding:2rem; border-radius:8px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1); width:320px; text-align:center;}
    h2 { margin-bottom:1.5rem; color:#333; }
    .input-group { margin-bottom:1rem; text-align:left; }
    .input-group label { display:block; margin-bottom:0.3rem; font-size:0.9rem; }
    .input-group input { width:100%; padding:0.6rem;
                         border:1px solid #ccd0d5; border-radius:4px;}
    .btn { width:100%; padding:0.7rem; background:#28a745; color:#fff;
           border:none; border-radius:4px; cursor:pointer; font-size:1rem;}
    .btn:hover { background:#218838; }
    .flash { margin-bottom:1rem; padding:0.6rem; border-radius:4px; font-size:0.9rem;}
    .flash.success { background:#d4edda; color:#155724;}
    .flash.danger  { background:#f8d7da; color:#721c24;}
    .flash.info    { background:#cce5ff; color:#004085;}
  </style>
</head>
<body>
  <div class="card">
    <h2>Email Verification</h2>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat,msg in messages %}
          <div class="flash {{ 'danger' if cat=='error' else cat }}">{{msg}}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form id="verifyForm" method="POST" action="{{ url_for('verify_email', user_id=user_id) }}">
      <div class="input-group">
        <label for="code">Enter verification code</label>
        <input type="text" id="code" name="code" maxlength="6"
               required pattern="\d{6}" placeholder="123456" />
      </div>
      <button type="submit" class="btn">Verify Email</button>
    </form>
  </div>
</body>
</html>
