<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - kwicshop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #2ECC71;
      --secondary-color: #34495E;
      --background-color: #F8F9FA;
      --input-border: #EAEDED;
      --error-color: #E74C3C;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--background-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
      margin: auto;
      padding: 1rem;
    }

    .header {
      text-align: center;
      margin-bottom: 1.5rem;
      animation: fadeIn 0.8s ease-out;
    }

    .logo {
      color: var(--primary-color);
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
      display: inline-block;
      transition: transform 0.3s ease;
    }

    .logo:hover {
      transform: scale(1.05);
    }

    .form-container {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      width: 100%;
      animation: formEntrance 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      transform-origin: top center;
    }

    .form-group {
      margin-bottom: 1.25rem;
      position: relative;
      opacity: 0;
      animation: formEntrance 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    .form-group:nth-child(1) { animation-delay: 0.2s; }
    .form-group:nth-child(2) { animation-delay: 0.3s; }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--secondary-color);
      font-weight: 500;
      font-size: 0.95rem;
      transition: color 0.3s ease;
    }

    input {
      width: 100%;
      padding: 0.9rem;
      border: 2px solid var(--input-border);
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.3s ease;
      -webkit-appearance: none;
      background-color: #fdfdfd;
    }

    input:hover {
      border-color: #d5dbdb;
      transform: translateY(-1px);
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.2);
      transform: translateY(-1px);
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 58%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--secondary-color);
      font-size: 1.1rem;
      background: white;
      padding: 0 5px;
      transition: all 0.2s ease;
    }

    .password-toggle:hover {
      transform: translateY(-50%) scale(1.1);
      color: var(--primary-color);
    }

    .submit-btn {
      background: var(--primary-color);
      color: white;
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      animation: formEntrance 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      animation-delay: 0.5s;
      opacity: 0;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(46, 204, 113, 0.25);
    }

    .submit-btn:active {
      transform: translateY(1px);
    }

    .loading-spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }

    .switch-form {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      animation: formEntrance 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      animation-delay: 0.6s;
      opacity: 0;
    }

    .switch-form a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      position: relative;
      transition: color 0.2s ease;
    }

    .switch-form a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary-color);
      transition: width 0.3s ease;
    }

    .switch-form a:hover::after {
      width: 100%;
    }

    .error-message {
      color: var(--error-color);
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
      animation: slideDown 0.3s ease-out;
    }

    .forgot-password {
      text-align: right;
      margin: -0.5rem 0 1.5rem 0;
      animation: formEntrance 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      animation-delay: 0.4s;
      opacity: 0;
    }

    .forgot-password a {
      color: var(--secondary-color);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    .forgot-password a:hover {
      color: var(--primary-color);
      text-decoration: underline;
    }

    .forgot-password i {
      color: var(--primary-color);
      transition: transform 0.3s ease;
    }

    .forgot-password a:hover i {
      transform: translateX(2px);
    }

    .form-actions {
      margin-top: 1rem;
      animation: formEntrance 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      animation-delay: 0.5s;
      opacity: 0;
    }

    .btn-google {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.8rem 1rem;
      background: #4285F4;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      width: 100%;
      font-size: 0.95rem;
    }

    .btn-google:hover {
      background: #357AE8;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(66, 133, 244, 0.25);
    }

    .btn-google:active {
      transform: translateY(0);
    }

    .flash-message {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 25px;
      background-color: var(--error-color);
      color: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      z-index: 1000;
      animation: slideIn 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55), fadeOut 0.5s 3s forwards;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .flash-message::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.3);
      animation: progressBar 3s linear forwards;
    }

    .flash-message i {
      font-size: 1.2rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes formEntrance {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes slideIn {
      from { top: -50px; opacity: 0; }
      to { top: 20px; opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @keyframes progressBar {
      from { width: 100%; }
      to { width: 0; }
    }

    @media (max-width: 480px) {
      body {
        padding: 0.5rem;
        justify-content: flex-start;
      }

      .container {
        padding: 0.5rem;
      }

      .form-container {
        padding: 1.25rem;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      }

      .logo {
        font-size: 1.5rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      input {
        padding: 0.8rem;
        font-size: 0.95rem;
      }

      .password-toggle {
        top: 55%;
        right: 10px;
      }

      .submit-btn {
        padding: 0.9rem;
        font-size: 1rem;
      }

      .switch-form {
        margin-top: 1.25rem;
      }

      .btn-google {
        padding: 0.7rem;
        font-size: 0.9rem;
      }
    }

    .alert {
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .alert-danger { background-color: #f8d7da; color: #721c24; }
    .alert-warning { background-color: #fff3cd; color: #856404; }

    /* === Ecommerce outline background: shoes, cars, dresses, bags, etc. === */

      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(1200px 600px at 10% -10%, #f6fff9, transparent 60%),
        url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400' viewBox='0 0 400 400'>\
  <g stroke='%2322c55e' stroke-opacity='0.13' stroke-width='2.2' fill='none' stroke-linecap='round' stroke-linejoin='round'>\

    <rect x='30' y='310' width='100' height='60' rx='6'/>\

    <rect x='230' y='320' width='120' height='55' rx='10'/>\
    <path d='M245 320 C245 300, 335 300, 335 320'/>\
\
    <!-- Dress on hanger (mini) -->\
    <path d='M320 220 C320 212, 332 212, 332 220'/>\
    <path d='M316 225 L336 225 L346 260 L306 260 Z'/>\

      background-size: 360px 360px, 360px 360px;
    }

    @media (max-width: 480px){
      body::before { background-size: 300px 300px, 300px 300px; }
    }
  </style>
</head>
<body>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flashed-messages">
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

  <div class="container">
    <div class="header">
      <div class="logo">SwapSphere</div>
      <h1>Please Login</h1>
    </div>
    <div class="form-container">

      <!-- NEW: Login method switcher -->
      <div style="display:flex; gap:10px; margin-bottom:1rem;">
        <button type="button" id="emailTab"
                style="flex:1; padding:0.6rem; border-radius:8px; border:none;
                       background:#2ECC71; color:#fff; font-weight:600; cursor:pointer;">
          Email Login
        </button>
        <button type="button" id="phoneTab"
                style="flex:1; padding:0.6rem; border-radius:8px; border:none;
                       background:#27AE60; color:#fff; font-weight:600; cursor:pointer; opacity:0.6;">
          Phone Login
        </button>
      </div>

      <!-- EMAIL LOGIN FORM (original) -->
      <form id="loginForm" method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
          <div class="error-message" id="emailError"></div>
        </div>
        <input type="hidden" name="next" value="{{ next_url }}">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
          <i class="fas fa-eye password-toggle" id="togglePassword"></i>
          <div class="error-message" id="passwordError"></div>
        </div>
        <div class="forgot-password">
          <a href="{{ url_for('forgot_password') }}">
            <i class="fas fa-question-circle"></i> Forgot Password?
          </a>
        </div>
        <button type="submit" class="submit-btn">
          <span class="btn-text">Login</span>
          <div class="loading-spinner"></div>
        </button>
        <div class="form-actions">
          <a href="{{ url_for('google_login', next=next_url) }}" class="btn-google">
            <i class="fab fa-google"></i> Quick Sign-up with Google
          </a>
        </div>
      </form>

      <!-- PHONE LOGIN FORM (new) -->
      <form id="phoneLoginForm" method="POST" action="{{ url_for('login_phone') }}" style="display:none;">
        <input type="hidden" name="next" value="{{ next_url }}">
        <div class="form-group">
          <label for="country_code">Country Code</label>
          <select id="country_code" name="country_code" required>
            <option value="+233">+233 (Ghana)</option>
            <option value="+1">+1 (USA)</option>
            <option value="+44">+44 (UK)</option>
            <option value="+91">+91 (India)</option>
          </select>
        </div>
        <div class="form-group">
          <label for="phone_number">Phone Number</label>
          <input type="text" id="phone_number" name="phone_number"
                 placeholder="e.g 054XXXXXXX" required>
        </div>
        <button type="submit" class="submit-btn">
          <span class="btn-text">Send Login Code</span>
          <div class="loading-spinner"></div>
        </button>
      </form>

      <div class="switch-form">
        Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a>
      </div>
    </div>
  </div>

  <script>
    // NEW: toggle between Email login and Phone login
    const emailTab = document.getElementById('emailTab');
    const phoneTab = document.getElementById('phoneTab');
    const emailForm = document.getElementById('loginForm');
    const phoneForm = document.getElementById('phoneLoginForm');

    emailTab.addEventListener('click', function() {
      emailForm.style.display = 'block';
      phoneForm.style.display = 'none';
      emailTab.style.opacity = '1';
      phoneTab.style.opacity = '0.6';
    });

    phoneTab.addEventListener('click', function() {
      emailForm.style.display = 'none';
      phoneForm.style.display = 'block';
      phoneTab.style.opacity = '1';
      emailTab.style.opacity = '0.6';
    });

    // Password toggle functionality
    const togglePassword = document.querySelector('#togglePassword');
    const passwordInput = document.querySelector('#password');
    
    function handlePasswordToggle() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      togglePassword.classList.toggle('fa-eye-slash');
      
      // Add bounce effect
      togglePassword.style.transform = 'translateY(-50%) scale(1.2)';
      setTimeout(() => {
        togglePassword.style.transform = 'translateY(-50%) scale(1)';
      }, 200);
      
      // Prevent keyboard focus on mobile
      if (window.innerWidth <= 480) {
        passwordInput.blur();
      }
    }

    togglePassword.addEventListener('click', handlePasswordToggle);
    togglePassword.addEventListener('touchstart', handlePasswordToggle);

    // Auto-hide flash message
    const flashMessage = document.querySelector('.flash-message');
    if (flashMessage) {
      setTimeout(() => {
        flashMessage.style.display = 'none';
      }, 3000);
    }

    // Form validation with enhanced animations (EMAIL login only)
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      let isValid = true;
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const emailError = document.getElementById('emailError');
      const passwordError = document.getElementById('passwordError');
      
      // Reset errors
      emailError.style.display = 'none';
      passwordError.style.display = 'none';
      
      // Validate email
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        emailError.textContent = 'Please enter a valid email address';
        emailError.style.display = 'block';
        isValid = false;
        
        // Add shake animation to input
        document.getElementById('email').style.animation = 'shake 0.4s ease';
        setTimeout(() => {
          document.getElementById('email').style.animation = '';
        }, 400);
      }

      // Validate password
      if (!password || password.length < 6) {
        passwordError.textContent = 'Password must be at least 6 characters';
        passwordError.style.display = 'block';
        isValid = false;
        
        // Add shake animation to input
        document.getElementById('password').style.animation = 'shake 0.4s ease';
        setTimeout(() => {
          document.getElementById('password').style.animation = '';
        }, 400);
      }

      if (!isValid) {
        e.preventDefault();
        if (window.innerWidth <= 480) {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      } else {
        // Show loading state
        const btn = this.querySelector('.submit-btn');
        btn.disabled = true;
        btn.querySelector('.btn-text').style.opacity = '0.5';
        btn.querySelector('.loading-spinner').style.display = 'block';
      }
    });

    // Add temporary shake animation for errors
    const style = document.createElement('style');
    style.textContent = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20%, 60% { transform: translateX(-5px); }
        40%, 80% { transform: translateX(5px); }
      }
    `;
    document.head.appendChild(style);

    // Prevent zoom on input focus for mobile
    document.addEventListener('DOMContentLoaded', function() {
      let viewport = document.querySelector("meta[name=viewport]");
      viewport.setAttribute("content", "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no");
    });

    // Add hover effects for all interactive elements
    document.querySelectorAll('a, button').forEach(el => {
      el.addEventListener('mouseenter', () => {
        el.style.transform = 'translateY(-1px)';
      });
      el.addEventListener('mouseleave', () => {
        el.style.transform = '';
      });
    });
  </script>
</body>
</html>
