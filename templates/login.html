<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - SwapSphere</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary-color: #2ECC71;
      --secondary-color: #34495E;
      --background-color: #F8F9FA;
      --input-border: #EAEDED;
      --error-color: #E74C3C;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--background-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
      margin: auto;
      padding: 1rem;
    }

    .header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .logo {
      color: var(--primary-color);
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }

    .form-container {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      width: 100%;
    }

    .form-group {
      margin-bottom: 1.25rem;
      position: relative;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--secondary-color);
      font-weight: 500;
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      padding: 0.9rem;
      border: 2px solid var(--input-border);
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s ease;
      -webkit-appearance: none;
    }

    input:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 58%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--secondary-color);
      font-size: 1.1rem;
      background: white;
      padding: 0 5px;
    }

    .submit-btn {
      background: var(--primary-color);
      color: white;
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }

    .switch-form {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.95rem;
    }

    .switch-form a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
    }

    .error-message {
      color: var(--error-color);
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }

    .forgot-password {
      text-align: right;
      margin: -0.25rem 0 1.25rem 0;
    }

    .forgot-password a {
      color: var(--secondary-color);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    @media (max-width: 480px) {
      body {
        padding: 0.5rem;
        justify-content: flex-start;
      }

      .container {
        padding: 0.5rem;
      }

      .form-container {
        padding: 1.25rem;
      }

      .logo {
        font-size: 1.5rem;
      }

      h1 {
        font-size: 1.5rem;
      }

      input {
        padding: 0.8rem;
        font-size: 0.95rem;
      }

      .password-toggle {
        top: 55%;
        right: 10px;
      }

      .submit-btn {
        padding: 0.9rem;
        font-size: 1rem;
      }

      .switch-form {
        margin-top: 1.25rem;
      }
    }
    .switch-form a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
    }
    .error-message {
      color: var(--error-color);
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
    }
    /* Flash message styles */
    .flash-message {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 25px;
      background-color: var(--error-color);
      color: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      z-index: 1000;
      animation: slideIn 0.3s, fadeOut 0.5s 3s forwards;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .flash-message i {
      font-size: 1.2rem;
    }
    @keyframes slideIn {
      from { top: -50px; opacity: 0; }
      to { top: 20px; opacity: 1; }
    }
    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* Add these styles to your existing CSS */
.forgot-password {
  text-align: right;
  margin: -0.5rem 0 1.5rem 0;
}

.forgot-password a {
  color: var(--secondary-color);
  text-decoration: none;
  font-size: 0.9rem;
  transition: color 0.3s ease;
}

.forgot-password a:hover {
  color: var(--primary-color);
  text-decoration: underline;
}

.forgot-password i {
  margin-right: 0.3rem;
  color: var(--primary-color);
}

.form-actions {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-top: 1rem;
}

.btn-google {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 1rem;
  background: #4285F4;
  color: #fff;
  border-radius: 4px;
  text-decoration: none;
  font-weight: 500;
  transition: background 0.2s;
}

.btn-google:hover {
  background: #357AE8;
}

  </style>
</head>
<body>
  <!-- Flash message container -->
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="flash-message">
        <i class="fas fa-exclamation-circle"></i>
        <span>{{ messages[0] }}</span>
      </div>
    {% endif %}
  {% endwith %}

  <div class="container">
    <div class="header">
      <div class="logo">SwapSphere</div>
      <h1>Welcome Back</h1>
    </div>
    <div class="form-container">
      <form id="loginForm" method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
          <div class="error-message" id="emailError"></div>
        </div>
        <input type="hidden" name="next" value="{{ next_url }}">
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required>
          <i class="fas fa-eye password-toggle" id="togglePassword"></i>
          <div class="error-message" id="passwordError"></div>
        </div>
        <div class="forgot-password">
          <a href="{{ url_for('forgot_password') }}">
            <i class="fas fa-question-circle"></i> Forgot Password?
          </a>
        </div>
        <button type="submit" class="submit-btn">Login</button>
            <a href="{{ url_for('login_google', next=next_url) }}" class="btn btn-google">
      <i class="fab fa-google"></i> Sign in with Google
    </a>
      </form>
      <div class="switch-form">
        Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a>
      </div>
    </div>
  </div>

  <script>
    // Enhanced password toggle with mobile optimization
    const togglePassword = document.querySelector('#togglePassword');
    const passwordInput = document.querySelector('#password');
    
    function handlePasswordToggle() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      togglePassword.classList.toggle('fa-eye-slash');
      
      // Prevent keyboard focus on mobile
      if (window.innerWidth <= 480) {
        passwordInput.blur();
      }
    }

    togglePassword.addEventListener('click', handlePasswordToggle);
    togglePassword.addEventListener('touchstart', handlePasswordToggle);

    // Auto-hide flash message
    const flashMessage = document.querySelector('.flash-message');
    if (flashMessage) {
      setTimeout(() => {
        flashMessage.style.display = 'none';
      }, 3000);
    }

    // Mobile-friendly form validation
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      let isValid = true;
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      document.querySelectorAll('.error-message').forEach(el => {
        el.style.display = 'none';
      });

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('emailError').textContent = 'Please enter a valid email address';
        document.getElementById('emailError').style.display = 'block';
        isValid = false;
      }

      if (!password || password.length < 6) {
        document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
        document.getElementById('passwordError').style.display = 'block';
        isValid = false;
      }

      if (!isValid) {
        e.preventDefault();
        if (window.innerWidth <= 480) {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      }
    });

    // Prevent zoom on input focus for mobile
    document.addEventListener('DOMContentLoaded', function() {
      let viewport = document.querySelector("meta[name=viewport]");
      viewport.setAttribute("content", "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no");
    });
  </script>
</body>
</html>
