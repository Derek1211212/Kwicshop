<!DOCTYPE html>
<html>
<head>
    <title>Black Friday Auctions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }
        .auction-section {
            max-width: 1200px;
            margin: auto;
        }
        .auction-title {
            text-align: center;
            font-size: 36px;
            color: darkgreen;
            margin-bottom: 40px;
        }
        .auction-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }
        .auction-card {
            background: #fff;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: 0.3s ease-in-out;
        }
        .auction-card:hover {
            transform: translateY(-5px);
        }
        .auction-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 6px;
        }
        .auction-card h3 {
            font-size: 20px;
            margin: 10px 0;
        }
        .auction-card p {
            margin: 5px 0;
            font-size: 14px;
        }
        .countdown {
            font-weight: bold;
            color: #ff0000;
            font-size: 16px;
        }
        .view-btn {
            display: block;
            margin-top: 10px;
            padding: 10px;
            background: green;
            color: #fff;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="auction-section">
        <h1 class="auction-title">🔥 Black Friday Auctions</h1>
        <div class="auction-grid">
            {% for item in auction_items %}
                <div class="auction-card">
                    <img src="{{ item.image1 }}" alt="Auction Image">
                    <h3>{{ item.title }}</h3>
                    <p><strong>Starting Bid:</strong> GHS {{ item.starting_bid }}</p>
                    <p><strong>Seller:</strong> {{ item.username }}</p>
                    <p><strong>Ends In:</strong> <span class="countdown" data-endtime="{{ item.end_time }}"></span></p>
                    <a href="/auction/{{ item.id }}" class="view-btn">Place Bid</a>
                </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function updateCountdowns() {
            const countdowns = document.querySelectorAll('.countdown');
            countdowns.forEach(span => {
                const endTime = new Date(span.getAttribute('data-endtime')).getTime();
                const now = new Date().getTime();
                const diff = endTime - now;

                if (diff <= 0) {
                    span.innerText = 'Auction Closed';
                } else {
                    const hours = Math.floor(diff / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                    span.innerText = `${hours}h ${minutes}m ${seconds}s`;
                }
            });
        }

        setInterval(updateCountdowns, 1000);
        updateCountdowns();
    </script>
</body>
</html>
