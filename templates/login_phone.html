<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Phone Login - kwicshop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <style>
    :root {
      --primary-color: #2ECC71;
      --secondary-color: #34495E;
      --background-color: #F8F9FA;
      --input-border: #EAEDED;
      --error-color: #E74C3C;
      --brand-green: #22c55e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--background-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
    }

    /* Background pattern */
    body::before{
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(1200px 600px at 10% -10%, #f6fff9, transparent 60%),
        url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400' viewBox='0 0 400 400'>\
  <g stroke='%2322c55e' stroke-opacity='0.13' stroke-width='2.2' fill='none' stroke-linecap='round' stroke-linejoin='round'>\
    <path d='M45 110 C60 130, 95 130, 120 120 L150 120 150 135 60 135 C50 135, 42 128, 45 110 Z'/>\
    <line x1='78' y1='118' x2='95' y2='118'/>\
    <line x1='86' y1='112' x2='103' y2='112'/>\
    <path d='M250 120 C270 140, 305 140, 330 126 L342 150 L325 150 L320 140 C305 150, 270 150, 252 136 Z'/>\
    <path d='M40 250 L75 220 L145 220 L170 245 L190 245 L190 270 L32 270 L32 255 L40 250 Z'/>\
    <circle cx='62' cy='270' r='10'/><circle cx='160' cy='270' r='10'/>\
    <line x1='90' y1='220' x2='130' y2='220'/>\
    <path d='M270 200 L285 180 L300 200 L295 220 L330 290 L240 290 L275 220 Z'/>\
    <path d='M285 180 C285 170, 295 170, 300 180'/>\
    <rect x='55' y='30' width='70' height='70' rx='6'/>\
    <path d='M60 60 C60 45, 120 45, 120 60'/>\
    <circle cx='80' cy='58' r='2.5'/><circle cx='100' cy='58' r='2.5'/>\
    <path d='M215 30 L240 45 L260 30 L285 45 L270 60 L270 105 L230 105 L230 60 Z'/>\
    <rect x='315' y='40' width='20' height='30' rx='4'/>\
    <circle cx='325' cy='85' r='18'/><line x1='325' y1='85' x2='325' y2='76'/><line x1='325' y1='85' x2='333' y2='85'/>\
    <rect x='315' y='104' width='20' height='30' rx='4'/>\
    <rect x='30' y='310' width='100' height='60' rx='6'/>\
    <path d='M25 373 L135 373 L145 360 L15 360 Z'/>\
    <rect x='230' y='320' width='120' height='55' rx='10'/>\
    <path d='M245 320 C245 300, 335 300, 335 320'/>\
    <path d='M320 220 C320 212, 332 212, 332 220'/>\
    <path d='M316 225 L336 225 L346 260 L306 260 Z'/>\
    <path d='M180 320 C190 330, 210 330, 225 325 L235 325 235 335 185 335 C180 335, 176 330, 180 320 Z'/>\
  </g>\
</svg>") repeat;
      background-size: 360px 360px, 360px 360px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      margin: auto;
      padding: 1rem;
    }

    .header {
      text-align: center;
      margin-bottom: 1.5rem;
      animation: fadeIn 0.8s ease-out;
    }

    .logo {
      color: var(--primary-color);
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.6rem;
      color: var(--secondary-color);
    }

    .form-container {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      animation: formEntrance 0.6s ease;
    }

    .form-group {
      margin-bottom: 1.25rem;
      opacity: 0;
      animation: formEntrance 0.4s forwards;
      animation-delay: 0.2s;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--secondary-color);
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: 0.9rem;
      border: 2px solid var(--input-border);
      border-radius: 8px;
      font-size: 1rem;
      background-color: #fdfdfd;
      transition: border-color 0.3s ease;
    }

    input:focus, select:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(46,204,113,0.2);
      outline: none;
    }

    .submit-btn {
      width: 100%;
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 500;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      transition: 0.3s ease;
    }

    .submit-btn:hover {
      background: #28b765;
      transform: translateY(-2px);
    }

    .error-message {
      color: var(--error-color);
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
    }

    .switch-form {
      margin-top: 1.5rem;
      text-align: center;
    }

    .switch-form a {
      color: var(--primary-color);
      text-decoration: none;
    }

    .flash-message {
      margin-bottom: 1rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes formEntrance {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div style="width: 100%; max-width: 480px; margin-bottom: 1rem;">
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<div class="container">

  <div class="header">
    <div class="logo">SwapSphere</div>
    <h1>Login with Phone</h1>
  </div>

  <div class="form-container">
    <form method="POST" action="{{ url_for('login_phone') }}">
      <div class="form-group">
        <label for="phone">Phone Number</label>

        <input type="text"
               id="phone"
               name="phone"
               placeholder="+233501234567"
               required>

        <div id="phoneError" class="error-message">Invalid phone number</div>
      </div>

      <button class="submit-btn" type="submit">
        <i class="fas fa-sms"></i> Send Login Code
      </button>
    </form>

    <div class="switch-form">
      Prefer email login? <a href="{{ url_for('login') }}">Login here</a>
    </div>
  </div>

</div>

<script>
  document.querySelector("form").addEventListener("submit", function(e) {
    const phone = document.getElementById("phone");
    const phoneError = document.getElementById("phoneError");
    phoneError.style.display = "none";

    if (!phone.value.trim().startsWith("+") || phone.value.length < 8) {
      e.preventDefault();
      phoneError.style.display = "block";
      phone.style.animation = "shake 0.3s";
      setTimeout(()=> phone.style.animation="", 300);
    }
  });

  const style = document.createElement("style");
  style.textContent = `
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-4px); }
      40%,80% { transform: translateX(4px); }
    }
  `;
  document.head.appendChild(style);
</script>

</body>
</html>
